<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Jimmy's typer blog test</title>
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <h1> Blog typer </h1>

  <div class="container">
    <h2>First line</h2>
    <h3 id="example"></h3>
    
  </div>


  <script src="typer.js/jquery.min.js"></script>
  <script src="typer.js/typer.min.js"></script>

  <script>
    $("#example").typer({
      strings: [
        "A great free jQuery plugin",
        "Animates typing strings",
        "Hosted In jQueryScript"
      ]

  </script>
  

  <input> enter your details here </input>

  <p>I am writing text on this line <br> <i>and down here too</i> </p>

  <button onclick="Click me"> I'm a button </button>
  <script>
    Var a = getElementById('button')
  </script>


</body>
</html>
